version: '3.8'

# Spice Runner - Local Grafana Testing Stack
# This stack provides local instances of Grafana, Prometheus, Loki, and Tempo
# for testing dashboards before deploying to Grafana Cloud.

services:
  grafana:
    image: grafana/grafana:11.0.0
    container_name: spice-runner-grafana
    ports:
      - "3001:3000"  # Using 3001 to avoid conflict with existing services
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,innius-video-panel
    volumes:
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: spice-runner-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  loki:
    image: grafana/loki:3.0.0
    container_name: spice-runner-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.4.0
    container_name: spice-runner-tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

networks:
  observability:
    driver: bridge
